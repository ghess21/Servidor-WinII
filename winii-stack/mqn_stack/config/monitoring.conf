# Configuración de monitoreo para MQN

# Verificación cada 5 minutos
CHECK_INTERVAL=300

# Alertas por WhatsApp
ALERT_NUMBER=9671262441

# Umbrales de alerta
MAX_CPU_USAGE=80
MAX_MEMORY_USAGE=85
MAX_DISK_USAGE=90

# Servicios a monitorear
SERVICES=("n8n" "postgres" "redis")

# Logs a monitorear
LOG_FILES=(
    "logs/n8n.log"
    "logs/backup.log"
    "logs/system.log"
)
